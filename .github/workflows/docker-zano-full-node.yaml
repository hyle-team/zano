name: Build & push zano-full-node docker image

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch or tag to build from
        required: true
        default: master
      image_tag: 
        description: Docker Hub tag to publish
        required: true
        default: latest

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        #with:
          #ref: ${{ github.event.inputs.branch }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: utils/docker/zano-full-node/Dockerfile
          push: true
          build-args: |
            BRANCH=${{ github.event.inputs.branch }}
            CACHEBUST=${{ github.run_id }}
          tags: |
            zanoproject/zano-full-node:${{ github.event.inputs.image_tag }}
            zanoproject/zano-full-node:${{ github.event.inputs.branch }}
          cache-from: type=registry,ref=zanoproject/zano-full-node:buildcache
          cache-to:   type=registry,ref=zanoproject/zano-full-node:buildcache,mode=max
